  <main>
    <section class="hero">
      <div class="hero-inner">
        <h1 data-cs="Datová a enterprise architektura pro firmy, které to s daty myslí vážně"
            data-en="Data and enterprise architecture for companies that take their data seriously"></h1>
        <p class="lead"
           data-cs="Přes deset let navrhujeme datové a integrační platformy ve farmacii, financích i logistice – cloud-agnosticky, s důrazem na governance a udržovatelnost."
           data-en="For over ten years we've designed data and integration platforms in pharma, finance and logistics — cloud-agnostic, with a focus on governance and maintainability."></p>
        <a class="btn" href="#contact" data-cs="Domluvit konzultaci →" data-en="Book a consultation →"></a>

    <section id="about" class="section about">
      <div class="about-grid">
        <div class="about-photo">
          <img src="assets/marek.jpeg" alt="Marek Matějka" />
          <p class="photo-caption">Marek Matějka</p>
        </div>
        <div class="about-text">
          <h2 data-cs="O nás" data-en="About"></h2>
          <p data-cs="Stojíte před rozhodnutím, jak postavit nebo srovnat datovou platformu – a chcete, aby to za dva roky nebyl problém k řešení. Přesně tam přicházíme."
             data-en="You're facing a decision on how to build or straighten out a data platform — and you want it not to become a problem to untangle two years down the line. That's exactly where we come in."></p>
          <p data-cs="Navrhujeme datové a platformové architektury, které se dají reálně postavit a udržet. Pracujeme cloud-agnosticky: výběr technologie podřizujeme zadání, ne naopak. Každé větší rozhodnutí necháváme dohledatelné v ADR, takže víte nejen, co se navrhlo, ale i proč."
             data-en="We design data and platform architectures that can genuinely be built and maintained. We work cloud-agnostically: the choice of technology follows the brief, not the other way around. Every major decision is kept traceable in an ADR, so you know not only what was designed, but also why."></p>
          <p data-cs="Za sebou máme přes deset let v enterprise a datové architektuře ve farmaceutice, financích a logistice, certifikaci TOGAF a praxi od cílového stavu a HLD po governance frameworky a master data. Mluvíme jazykem byznysu i IT – a hlídáme, aby spolu obě strany skutečně mluvily."
             data-en="We bring over ten years in enterprise and data architecture across pharma, finance and logistics, a TOGAF certification, and hands-on experience from target state and HLD through to governance frameworks and master data. We speak the language of both business and IT — and we make sure the two sides genuinely talk to each other."></p>
        </div>
      </div>
    </section>

    <section id="services" class="section services">
      <h2 data-cs="Co děláme" data-en="What we do"></h2>
      <div class="services-grid">
        <div class="service">
          <h3 data-cs="Enterprise a datová architektura" data-en="Enterprise and data architecture"></h3>
          <p data-cs="Cílový stav, HLD, architektonická rozhodnutí (ADR) a realizovatelný plán přechodu."
             data-en="Target state, HLD, architecture decision records (ADRs) and a workable transition plan."></p>
        </div>
        <div class="service">
          <h3 data-cs="Data governance" data-en="Data governance"></h3>
          <p data-cs="Frameworky pro datovou kvalitu, model vlastnictví a stewardshipu, katalogizace a lineage."
             data-en="Data quality frameworks, an ownership and stewardship model, cataloguing and lineage."></p>
        </div>
        <div class="service">
          <h3 data-cs="Návrh platforem bez lock-inu" data-en="Lock-in-free platform design"></h3>
          <p data-cs="Azure, Databricks, Snowflake, Microsoft Fabric volené podle potřeby, ne podle zvyku."
             data-en="Azure, Databricks, Snowflake, Microsoft Fabric chosen by need, not by habit."></p>
        </div>
        <div class="service">
          <h3 data-cs="Master a referenční data (MDM/RDM)" data-en="Master and reference data (MDM/RDM)"></h3>
          <p data-cs="Návrh platforem a jejich integrace do širší krajiny."
             data-en="Platform design and integration into the wider landscape."></p>
        </div>
      </div>
